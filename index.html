let allTests = [...labTests];
let filteredTests = [...allTests];
const categories = [...new Set(allTests.map(t=>t.category))];

function initFilterTabs(){
  const tabs = document.getElementById('filterTabs');
  const all = document.createElement('div');
  all.className='filter-tab active'; all.textContent='全部';
  all.onclick=()=>{ document.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('active')); all.classList.add('active'); filteredTests=[...allTests]; displayResults(); };
  tabs.appendChild(all);
  categories.forEach(cat=>{
    const d = document.createElement('div');
    d.className='filter-tab'; d.textContent=cat;
    d.onclick=()=>{ document.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('active')); d.classList.add('active'); filteredTests = allTests.filter(x=>x.category===cat); displayResults(); };
    tabs.appendChild(d);
  });
}

function escapeHtml(str) {
  if(!str) return '';
  return String(str).replace(/[&<>"]/g, function(s) {
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[s];
  });
}

function highlightKeyword(text, keyword){
  if(!keyword) return escapeHtml(text);
  try{
    const re = new RegExp('(' + keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
    return escapeHtml(text).replace(re, '<span class="highlight">$1</span>');
  }catch(e){
    return escapeHtml(text);
  }
}

function displayResults(){
  const results = document.getElementById('results');
  if(!results) return;
  if(filteredTests.length===0){
    results.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><div>未找到相关检验项目</div><div style="font-size:12px;margin-top:10px;color:#bbb;">请尝试其他关键词或选择不同分类</div></div>';
    return;
  }
  const keyword = (document.getElementById('searchInput').value||'').toLowerCase();
  let html = '';
  filteredTests.forEach(t=>{
    html += '<div class="result-item">';
    html += '<div class="item-header">';
    html += '<div class="item-icon">🧫</div>';
    html += '<div class="item-title">' + highlightKeyword(t.name||'', keyword) + '</div>';
    html += '<div class="badge">' + escapeHtml(t.category||'') + '</div>';
    html += '</div>';
    html += '<div class="info-row"><span class="info-label">🩸 标本类型</span><span class="info-value">' + escapeHtml(t.specimen||'') + '</span></div>';
    html += '<div class="info-row"><span class="info-label">🧪 容器</span><span class="info-value">' + escapeHtml(t.container||'') + '</span></div>';
    html += '<div class="info-row"><span class="info-label">📏 标本量</span><span class="info-value">' + escapeHtml(t.amount||'') + '</span></div>';
    html += '<div class="info-row"><span class="info-label">👤 患者准备</span><span class="info-value">' + escapeHtml(t.preparation||'') + '</span></div>';
    html += '<div class="info-row"><span class="info-label">🚚 运送要求</span><span class="info-value">' + escapeHtml(t.transport||'') + '</span></div>';
    html += '<div class="info-row"><span class="info-label">⏱️ 送检时限</span><span class="info-value">' + escapeHtml(t.deliveryTime||'') + '</span></div>';
    html += '<div class="info-row"><span class="info-label">📋 说明</span><span class="info-value">' + escapeHtml(t.notes||'') + '</span></div>';
    html += '</div>';
  });
  results.innerHTML = html;
}

function search(){
  const kw = (document.getElementById('searchInput').value||'').toLowerCase();
  const active = (document.querySelector('.filter-tab.active')||{textContent:'全部'}).textContent;
  if(active==='全部'){
    filteredTests = allTests.filter(t=> (t.name||'').toLowerCase().includes(kw) || (t.specimen||'').toLowerCase().includes(kw) || (t.container||'').toLowerCase().includes(kw) || (t.notes||'').toLowerCase().includes(kw));
  }else{
    filteredTests = allTests.filter(t=> t.category===active && ((t.name||'').toLowerCase().includes(kw) || (t.specimen||'').toLowerCase().includes(kw) || (t.container||'').toLowerCase().includes(kw) || (t.notes||'').toLowerCase().includes(kw)));
  }
  displayResults();
}

document.getElementById('searchBtn').addEventListener('click', search);
document.getElementById('searchInput').addEventListener('keypress', (e)=>{ if(e.key==='Enter') search(); });

initFilterTabs();
displayResults();
